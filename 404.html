    <style>
        @font-face {
            font-family: 'Pagkaki';
            src: url('assets/fonts/PAGKAKI-Regular.ttf') format('truetype');
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black:    #000000;
            --off-black: #0a0a0a;
            --border:   rgba(255,255,255,0.08);
            --gray:     rgba(255,255,255,0.38);
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--black);
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Main content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
        }

        .error-code {
            font-family: 'Pagkaki', sans-serif;
            font-size: clamp(100px, 20vw, 200px);
            line-height: 1;
            color: white;
            display: block;
            margin-bottom: 28px;
        }

        .error-msg {
            font-size: clamp(15px, 2vw, 18px);
            color: rgba(255,255,255,0.5);
            margin-bottom: 52px;
            letter-spacing: 0.02em;
        }

        .home-btn {
            display: inline-block;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            border: 1px solid white;
            padding: 14px 36px;
            transition: background 0.25s;
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.08);
        }

        /* Footer */
        footer {
            background: var(--off-black);
            border-top: 1px solid var(--border);
            padding: 28px 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .footer-copy {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.04em;
        }

        .footer-copy a {
            color: inherit;
            opacity: 0.6;
            text-decoration: none;
        }

        .footer-socials {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .footer-socials a {
            opacity: 0.4;
            transition: opacity 0.2s;
            display: flex;
        }

        .footer-socials a:hover { opacity: 1; }
        .footer-socials svg { width: 17px; height: 17px; fill: white; }

        @media (max-width: 600px) {
            footer { padding: 28px 24px; flex-direction: column; gap: 20px; text-align: center; }
            .error-code { margin-bottom: 20px; }
        }
    </style>
